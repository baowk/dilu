# =============================================================================
# dilu 生产配置 Secret
# 使用方式：
#   1. 修改下方 config.prod.yaml 中的所有敏感值（jwt.sign-key / dbcfg.dns 等）
#   2. kubectl apply -f k8s/secret.yaml -n <namespace>
#   3. 更新配置后：kubectl rollout restart deployment/dilu -n <namespace>
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: dilu-config
  namespace: default          # 按需修改命名空间
  labels:
    app: dilu
type: Opaque
stringData:
  config.prod.yaml: |
    server:
      mode: prod
      host: 0.0.0.0
      name: dilu-app
      port: 7888
      node: 1                 # 多实例部署时每个 Pod 应不同，可通过 Downward API 注入

    logger:
      level: info
      format: json            # 生产环境建议 json 便于日志采集
      director: /tmp/log
      show-line: false
      log-in-console: true
      output-mode: single

    jwt:
      sign-key: "REPLACE_WITH_YOUR_SECRET_AT_LEAST_32_CHARS"   # ← 必填，至少32字符
      expires: 10080          # Token 有效期（分钟）
      refresh: 14400          # 刷新窗口（秒）

    cache:
      type: redis
      addr: redis-service:6379
      password: ""            # Redis 密码，无密码留空
      db: 0

    dbcfg:
      driver: mysql
      dns: "root:REPLACE_PASSWORD@tcp(mysql-service:3306)/dilu-db?charset=utf8mb4&parseTime=True&loc=Local&timeout=1000ms"
      log-mode: warn
      slow-threshold: 200
      max-idle-conns: 10
      max-open-conns: 30

    cors:
      enable: true
      mode: whitelist         # 生产环境建议 whitelist，不要 allow-all
      whitelist:
        - allow-origin: "https://your-domain.com"
          allow-methods: "POST, GET, PUT, DELETE, OPTIONS"
          allow-headers: "Content-Type, Authorization, Token"
          expose-headers: "Content-Length, refresh-access-token, refresh-exp"
          allow-credentials: true

    access-limit:
      enable: true
      duration: 5s
      total: 300

    gen:
      enable: false           # 生产环境关闭代码生成接口
